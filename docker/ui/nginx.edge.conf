# Edge router for the split-container topology. Sits in front of the proxy and
# the UI container so the browser sees a single origin (no CORS, same-origin
# cookies). Used by docker-compose.ui-split.yml.
#
#   /ui/*, /_next/*, /litellm-asset-prefix/*  -> ui:8080
#   everything else                            -> litellm:4000

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream litellm_proxy { server litellm:4000; }
upstream litellm_ui    { server ui:8080;     }

server {
    listen 4000;
    server_name _;

    server_tokens off;
    client_max_body_size 100m;

    # Streaming endpoints (chat completions, logs tail) need unbuffered upstream
    # responses and generous timeouts.
    proxy_http_version 1.1;
    proxy_buffering    off;
    proxy_request_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        $connection_upgrade;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /ui              { return 301 /ui/; }
    location /ui/               { proxy_pass http://litellm_ui; }
    location /_next/            { proxy_pass http://litellm_ui; }
    location /litellm-asset-prefix/ { proxy_pass http://litellm_ui; }

    location / {
        proxy_pass http://litellm_proxy;
    }
}

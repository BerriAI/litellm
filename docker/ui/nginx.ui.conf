# nginx config for the UI container. Serves the Next.js static export of the
# LiteLLM admin dashboard. The edge router (see nginx.edge.conf) is responsible
# for routing /ui, /_next, and /litellm-asset-prefix here, and everything else
# to the proxy.

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;

    # Refuse host-header smuggling at the front door of the static server.
    server_tokens off;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Hashed Next.js bundles - immutable, long cache.
    location /_next/ {
        access_log off;
        expires 365d;
        add_header Cache-Control "public, immutable";
        alias /usr/share/nginx/html/ui/_next/;
        try_files $uri =404;
    }

    # Same bundles, served under the assetPrefix configured in next.config.mjs.
    location /litellm-asset-prefix/_next/ {
        access_log off;
        expires 365d;
        add_header Cache-Control "public, immutable";
        alias /usr/share/nginx/html/ui/_next/;
        try_files $uri =404;
    }

    # Page routes. /ui/login -> login/index.html via the directory-with-index lookup.
    # HTML responses must not be cached so deploys roll out cleanly.
    location /ui/ {
        add_header Cache-Control "no-cache, must-revalidate";
        index index.html;
        try_files $uri $uri/ $uri.html =404;
    }

    location / {
        return 404;
    }
}

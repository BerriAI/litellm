# Helm values for EKS performance stack: LiteLLM + RDS (external Postgres) + Bitnami Redis.
# Argo CD: deploy/performance/argocd/application-litellm.yaml
#
# RDS: create Secret `litellm-rds` in namespace `performance` before sync (see comments on `environmentSecrets`).
# Redis: in-cluster Bitnami unchanged — set redis.auth.password for a stable password across syncs.
#
# Chart default image tag is main-<Chart.appVersion> (e.g. main-v1.80.12). That pattern is not always
# published for ghcr.io/berriai/litellm-database; use main-latest or a tag from:
# https://github.com/BerriAI/litellm/pkgs/container/litellm-database
image:
  repository: ghcr.io/berriai/litellm-database
  tag: main-latest

replicaCount: 2

args:
  - --config
  - /etc/litellm/config.yaml
  - --num_workers
  - "2"
  - --max_requests_before_restart
  - "20000"

service:
  type: LoadBalancer
  port: 4000

nodeSelector:
  workload: litellm

securityContext:
  capabilities:
    add:
      - SYS_PTRACE

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "4"
    memory: "4Gi"

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

livenessProbe:
  initialDelaySeconds: 45
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

startupProbe:
  failureThreshold: 30

envVars:
  STORE_MODEL_IN_DB: "True"
  ENV: "production"
  LITELLM_ENVIRONMENT: "production"

db:
  deployStandalone: false
  useExisting: false

# Load DATABASE_URL (and optional DIRECT_URL) from a Secret — do not commit credentials to Git.
# Create once (replace host/user/pass/db); use RDS endpoint and ?sslmode=require for RDS.
#   kubectl -n performance create secret generic litellm-rds \
#     --from-literal=DATABASE_URL='postgresql://USER:PASSWORD@RDS_HOST:5432/litellm?sslmode=require' \
#     --from-literal=DIRECT_URL='postgresql://USER:PASSWORD@RDS_HOST:5432/litellm?sslmode=require'
# URL-encode special characters in USER/PASSWORD. For RDS Proxy, pooler URL can be DATABASE_URL and
# instance endpoint DIRECT_URL for Prisma; often the same string is fine for RDS without proxy.
environmentSecrets:
  - litellm-rds

redis:
  enabled: true
  architecture: standalone
  # Same as Postgres: chart default docker.io/bitnami/redis tags may 404; legacy catalog:
  # https://hub.docker.com/r/bitnamilegacy/redis/tags
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 7.2.5-debian-12-r6
  master:
    persistence:
      storageClass: gp2

# Skip separate Batch Job + Argo PreSync: proxy image runs DB setup on startup when
# DISABLE_SCHEMA_UPDATE is not set (see litellm/proxy/proxy_cli.py). Use the Job again if you
# prefer migrations before any proxy pod starts, or if you run many replicas and want a single migration step.
migrationJob:
  enabled: false
  hooks:
    argocd:
      enabled: false

proxy_config:
  model_list:
    - model_name: fake-openai-endpoint
      litellm_params:
        model: openai/fake-model
        api_key: fake-key
        api_base: https://exampleopenaiendpoint-production.up.railway.app/
        timeout: 40
  general_settings:
    master_key: os.environ/PROXY_MASTER_KEY
    health_check_details: false
    database_url: os.environ/DATABASE_URL
  litellm_settings:
    drop_params: true
    telemetry: false
    callbacks: []
    cache: true
    cache_params:
      type: redis
      supported_call_types: []

# Internet-facing NLB :80 -> LiteLLM :4000 (same Argo app as chart). Prune removes it if deleted here.
extraResources:
  - apiVersion: v1
    kind: Service
    metadata:
      name: litellm-nlb
      namespace: performance
      annotations:
        service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
        service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    spec:
      type: LoadBalancer
      ports:
        - port: 80
          targetPort: 4000
          protocol: TCP
          name: http
      selector:
        app.kubernetes.io/name: litellm
        app.kubernetes.io/instance: litellm

{{- with .Values.serviceMonitor }}
{{- if and (eq .enabled true) }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "litellm.fullname" $ }}
  labels:
    {{- include "litellm.labels" $ | nindent 4 }}
    {{- if .labels }}
    {{- toYaml .labels | nindent 4 }}
    {{- end }}
  {{- if .annotations }}
  annotations:
    {{- toYaml .annotations | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "litellm.selectorLabels" $ | nindent 6 }}
  namespaceSelector:
    matchNames:
    # if not set, use the release namespace
    {{- if not .namespaceSelector.matchNames }}
    - {{ $.Release.Namespace | quote }}
    {{- else }}
    {{- toYaml .namespaceSelector.matchNames | nindent 4 }}
    {{- end }}
  endpoints:
  - port: http
    path: /metrics/
    interval: {{ .interval }}
    scrapeTimeout: {{ .scrapeTimeout }}
    scheme: http
    {{- if .authSecret.enabled }}
    authorization:
      type: Bearer
      credentials:
        {{- if .authSecret.name }}
        name: {{ .authSecret.name }}
        key: {{ required "serviceMonitor.authSecret.key is required when serviceMonitor.authSecret.name is set" .authSecret.key }}
        {{- else if .authSecret.useMasterKey }}
        name: {{ $.Values.masterkeySecretName | default (printf "%s-masterkey" (include "litellm.fullname" $)) }}
        key: {{ $.Values.masterkeySecretKey | default "masterkey" }}
        {{- else }}
        {{- fail "The proxy requires a bearer token to scrape /metrics. Set serviceMonitor.authSecret.name and serviceMonitor.authSecret.key to a secret holding a dedicated virtual key (recommended), or set serviceMonitor.authSecret.useMasterKey=true to scrape with the master key, or set serviceMonitor.authSecret.enabled=false if the proxy runs with require_auth_for_metrics_endpoint: false" }}
        {{- end }}
    {{- end }}
  {{- if .relabelings }}
    relabelings:
{{- toYaml .relabelings | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}

masterkeySecretName: litellm-masterkey
environmentSecrets:
  - litellm-env-secret
environmentConfigMaps:
  - litellm-env-configmap
db:
  deployStandalone: false
  useExisting: true
  database: litellm-db
  secret:
    usernameKey: POSTGRESQL_USER
    passwordKey: POSTGRESQL_PASSWORD
    endpointKey: POSTGRESQL_HOST_AND_PORT
migrationJob:
  enabled: true
extraResources:
  # do not do this in prod. As example how it could be used
  - name: litellm-env-secret
    kind: Secret
    apiVersion: v1
    metadata:
      name: litellm-env-secret
    stringData:
      POSTGRESQL_USER: "litellm"
      POSTGRESQL_PASSWORD: "secretpassword"
      POSTGRESQL_HOST: "postgres.postgres-namespace.cluster.svc.local"
      POSTGRESQL_PORT: "55432"
      POSTGRES_DB: "litellm-db"
      POSTGRESQL_HOST_AND_PORT: "postgres.postgres-namespace.cluster.svc.local:55432"

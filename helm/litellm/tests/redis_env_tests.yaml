suite: test redis coordination env vars
templates:
  - gateway/deployment.yaml
  - gateway/configmap.yaml
  - backend/deployment.yaml
values:
  - ./values/required.yaml
tests:
  - it: gateway omits redis env vars when no host is configured
    template: gateway/deployment.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_HOST
            value: redis.example.com
          any: true
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_CLUSTER_NODES
          any: true

  - it: gateway emits host, port and password when redis is configured
    template: gateway/deployment.yaml
    set:
      redis.host: redis.example.com
      redis.port: 6380
      redis.passwordSecret.name: redis-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_HOST
            value: redis.example.com
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PORT
            value: "6380"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: redis-secret
                key: password

  - it: backend emits the same redis env vars so both pods coordinate on one redis
    template: backend/deployment.yaml
    set:
      redis.host: redis.example.com
      redis.passwordSecret.name: redis-secret
      redis.passwordSecret.passwordKey: redis-password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_HOST
            value: redis.example.com
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: redis-secret
                key: redis-password

  - it: gateway omits REDIS_PASSWORD for an auth-less redis
    template: gateway/deployment.yaml
    set:
      redis.host: redis.example.com
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
          any: true
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_HOST
            value: redis.example.com

  - it: gateway seeds REDIS_CLUSTER_NODES from host and port in cluster mode
    template: gateway/deployment.yaml
    set:
      redis.host: redis.example.com
      redis.port: 6380
      redis.cluster: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_CLUSTER_NODES
            value: '[{"host":"redis.example.com","port":6380}]'

  - it: gateway omits REDIS_CLUSTER_NODES when cluster mode is off
    template: gateway/deployment.yaml
    set:
      redis.host: redis.example.com
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_CLUSTER_NODES
          any: true

general_settings:
  master_key: sk-1234

litellm_settings:
  drop_params: true

model_list:
  - model_name: gpt-4o-mini
    litellm_params:
      model: gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

mcp_servers:
  test_server:
    transport: stdio
    command: python
    args:
      - tests/mcp_tests/custom_mcp_server.py
    allow_all_keys: true

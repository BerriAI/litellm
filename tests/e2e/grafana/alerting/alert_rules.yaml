# Grafana Alerting rule: fire when the e2e suite reports failed/errored tests.
#
# Grafana provisioning (apiVersion 1). This evaluates the E2E_RESULT signal the
# harness already ships to Loki (one logfmt line per finished test, emitted from
# pytest_runtest_makereport in tests/e2e/conftest.py via e2e_result_reporter.py),
# so it keeps working when the proxy or the runner is degraded -- exactly the
# case where an in-runner remediation call back through the proxy would fail.
#
# Grouping and repeat suppression on the rule's notification_settings replace the
# old hand-rolled sha256 node-id dedup: one Slack notification per failing
# package per window, re-sent only every repeat_interval while it stays red.
#
# Set LOKI_DATASOURCE_UID to your Loki datasource UID (Grafana expands $__env{}
# in provisioning files; substitute the literal UID if your Grafana predates it).
apiVersion: 1

groups:
  - orgId: 1
    name: litellm-e2e
    folder: LiteLLM E2E
    # Evaluate every 1m over a 5m lookback so windows overlap 5x. A range that
    # equals the evaluation interval tiles with no overlap, so a line ingested
    # late or near a boundary (Loki ingestion lag, clock skew) can fall between
    # two windows and never alert. The overlap closes that gap; grouping and
    # repeat_interval on notification_settings keep it to one notification.
    interval: 1m
    rules:
      - uid: litellm-e2e-suite-failure
        title: LiteLLM e2e suite failure
        condition: C
        for: 0m
        noDataState: OK
        execErrState: Error
        labels:
          service: litellm-e2e
          severity: ticket
        annotations:
          summary: 'e2e package "{{ $labels.package }}" has failing tests'
          description: >-
            One or more tests in the "{{ $labels.package }}" package under
            tests/e2e/ failed or errored in the last evaluation window.
          drilldown_query: >-
            {service_name="litellm-e2e"} |= "E2E_RESULT" | logfmt |
            package="{{ $labels.package }}" | outcome=~"failed|error"
        notification_settings:
          receiver: devin-e2e-remediation
          group_by:
            - alertname
            - package
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: $__env{LOKI_DATASOURCE_UID}
            model:
              refId: A
              datasource:
                type: loki
                uid: $__env{LOKI_DATASOURCE_UID}
              editorMode: code
              queryType: instant
              expr: >-
                sum by (package) (count_over_time({service_name="litellm-e2e"}
                |= "E2E_RESULT" | logfmt | outcome=~"failed|error" [5m]))
          - refId: B
            datasourceUid: __expr__
            model:
              refId: B
              type: reduce
              reducer: last
              expression: A
              datasource:
                type: __expr__
                uid: __expr__
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
              datasource:
                type: __expr__
                uid: __expr__

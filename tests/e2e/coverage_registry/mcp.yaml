# OAuth BYOK "Authorize & Fetch Token" flow (byok_oauth_endpoints.py, include_in_schema=False).
- id: mcp.oauth_authorize.oauth.issues_code
  module: mcp
  tier: P1
  operation: oauth_authorize
  auth_family: oauth
  assertions: [issues_code]
  source: "byok_oauth_endpoints.py:699"
  rationale: Authenticated authorize stores a one-time code bound to user_id + PKCE challenge and redirects with code+state
- id: mcp.oauth_token.oauth.exchanges_code
  module: mcp
  tier: P1
  operation: oauth_token
  auth_family: oauth
  assertions: [exchanges_code]
  source: "byok_oauth_endpoints.py:762"
  rationale: Valid code + PKCE verifier mints a byok_session JWT and persists the per-user upstream credential
- id: mcp.oauth_token.oauth.rejects_bad_pkce
  module: mcp
  tier: P0
  operation: oauth_token
  auth_family: oauth
  assertions: [rejects_bad_pkce]
  source: "byok_oauth_endpoints.py:794"
  rationale: S256 verifier mismatch returns invalid_grant; the PKCE trust boundary must not be bypassable
- id: mcp.oauth_token.oauth.rejects_reused_code
  module: mcp
  tier: P1
  operation: oauth_token
  auth_family: oauth
  assertions: [rejects_reused_code]
  source: "byok_oauth_endpoints.py:832"
  rationale: Authorization code is one-time-use; a replay is refused
- id: mcp.oauth_metadata.none.discoverable
  module: mcp
  tier: P2
  operation: oauth_metadata
  auth_family: none
  assertions: [discoverable]
  source: "byok_oauth_endpoints.py:599"
  rationale: Public .well-known AS + protected-resource metadata advertise S256 + authorization_code so MCP clients discover the flow


# Rayward internal LLM gateway — v1 prod config.
#
# This file is the actual deployment config baked into the image. Secrets come
# from env vars (resolved at runtime from Azure Key Vault via Container Apps).
#
# Auth model:
#   - Azure OpenAI:  Managed Identity → Entra short-lived tokens.
#                    Enabled by `enable_azure_ad_token_refresh: true` below;
#                    each Azure model omits api_key so DefaultAzureCredential
#                    is used. The Container App's system-assigned MI must hold
#                    "Cognitive Services OpenAI User" on the AOAI account.
#   - Bedrock (v1.1c) and Vertex (v1.1d): added later via WIF + MI-token-bridge.
#                    Their model_list entries also omit api_key.

model_list:
  - model_name: gpt-5.5
    litellm_params:
      model: azure/gpt-5.5
      api_base: os.environ/AZURE_OPENAI_ENDPOINT
      api_version: os.environ/AZURE_OPENAI_API_VERSION
      # NO api_key — DefaultAzureCredential via MI

  - model_name: gpt-5.4
    litellm_params:
      model: azure/gpt-5.4
      api_base: os.environ/AZURE_OPENAI_ENDPOINT
      api_version: os.environ/AZURE_OPENAI_API_VERSION

  - model_name: gpt-5.3-codex
    litellm_params:
      model: azure/gpt-5.3-codex
      api_base: os.environ/AZURE_OPENAI_ENDPOINT
      api_version: os.environ/AZURE_OPENAI_API_VERSION

  - model_name: text-embedding-3-large
    litellm_params:
      model: azure/text-embedding-3-large
      api_base: os.environ/AZURE_OPENAI_ENDPOINT
      api_version: os.environ/AZURE_OPENAI_API_VERSION

  - model_name: text-embedding-3-small
    litellm_params:
      model: azure/text-embedding-3-small
      api_base: os.environ/AZURE_OPENAI_ENDPOINT
      api_version: os.environ/AZURE_OPENAI_API_VERSION

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  salt_key: os.environ/LITELLM_SALT_KEY

  # Postgres pool (Supabase Transaction pooler, port 6543).
  # Direct (Session pooler 5432) is exposed via DIRECT_DATABASE_URL for the
  # Prisma migrate Container Apps Job; it's NOT used for runtime traffic.
  database_url: os.environ/DATABASE_URL

  # Provider creds + model_list live in this YAML, NOT the DB. Mercor-era
  # supply-chain hardening: keep the DB schema slim so leaking the DB password
  # doesn't leak provider creds.
  store_model_in_db: false

litellm_settings:
  drop_params: true                  # silently drop unsupported params per provider
  telemetry: false                   # no usage telemetry to BerriAI
  turn_off_message_logging: true     # don't log prompt/response bodies in spend logs

  # Use Managed Identity / DefaultAzureCredential for ALL azure/* models that
  # don't carry an explicit api_key. Refreshes tokens automatically before expiry.
  enable_azure_ad_token_refresh: true

  # Prometheus metrics for the Grafana dashboard (scraped via the Cloudflare
  # Access service-token policy on /metrics).
  callbacks: ["prometheus"]

  # Langfuse is OPT-IN per-request via header (see implementation plan Task 11
  # Step 4). Default success_callback list intentionally empty.
  # IMPLEMENTATION TODO: at Container App boot, verify whether the pinned
  # litellm version supports header-driven callback gating; if not, write a
  # small custom hook that consults `x-litellm-trace: langfuse` before invoking
  # the langfuse callback. Langfuse keys (LANGFUSE_PUBLIC_KEY/SECRET_KEY/HOST)
  # are wired in via env vars but unused until the gating is verified.
  success_callback: []

router_settings:
  # Round-robin within model groups if/when we add fallbacks. With one
  # deployment per model_name we get deterministic routing.
  routing_strategy: "simple-shuffle"
  # Retry on 429s and transient 5xx for chat-style models.
  num_retries: 2
  timeout: 60

litellm_settings:
    # json_logs: true
    # set_verbose: False

    # Logging integrations (metrics/tracing). This is separate from proxy hooks.
    # Enterprise hooks `managed_files` and `managed_vector_stores` load automatically
    # when `litellm-enterprise` is installed (see litellm/proxy/hooks/__init__.py).
    # Managed files/containers need a database: set DATABASE_URL and run Prisma migrations.
    callbacks: ["prometheus", "datadog", "langfuse"]
    service_callback: ["prometheus_system", "datadog"]
    allow_dynamic_callback_disabling: false

    datadog_params:
      turn_off_message_logging: true

    datadog_llm_observability_params:
      turn_off_message_logging: true

    # cold_storage_custom_logger: s3_v2
    # s3_callback_params:
    #   s3_bucket_name: litellm-dev-logging
    #   s3_region_name: us-east-1

    general_settings:
      store_prompts_in_cold_storage: true
      store_prompts_in_spend_logs: true

model_list:
  - model_name: gpt-4.1-mini
    litellm_params:
      model: azure/gpt-4.1-mini
      # api_key: os.environ/OPENAI_API_KEY
      api_version: 2025-03-01-preview
      base_model: azure/gpt-4.1-mini
      tpm: 20_000
      timeout: 180
      stream_timeout: 180
      max_retries: 4
      use_in_pass_through: true
    model_info:
      mode: chat


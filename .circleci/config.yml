      - restore_cache:
          keys:
            - v2-dependencies-{{ checksum "uv.lock" }}
            - v2-dependencies-
      - install_uv
      - run:
          name: Install Dependencies
          command: |
            uv sync --frozen --all-groups --all-extras --python 3.12
      - setup_litellm_enterprise_pip
      - save_cache:
          paths:
            - ./.venv
          key: v2-dependencies-{{ checksum "uv.lock" }}
      - run:
          name: Run prisma ./docker/entrypoint.sh
          command: |
            set +e
            chmod +x docker/entrypoint.sh
            ./docker/entrypoint.sh
            set -e

      # Run pytest and generate JUnit XML report
      - run:
          name: Run tests
          command: |
            pwd
            ls
            uv run --no-sync python -m pytest -v tests/local_testing -x --junitxml=test-results/junit.xml --durations=5 -k "langfuse"
          no_output_timeout: 15m
      # Store test results
      - store_test_results:
          path: test-results
  auth_ui_unit_tests:
    docker:
      - image: cimg/python:3.12@sha256:9c796c23c84e84a66a964acb508d39dc5433c81a47e07efd56dccbbc2427e07c
        auth:
          username: ${DOCKERHUB_USERNAME}
          password: ${DOCKERHUB_PASSWORD}
      - image: cimg/postgres:16.0@sha256:b125148bc76e8e8eee5eb3ad6020a3a14110a14e8192f1c645128afebe2e2f84
        environment:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: litellm_test
    working_directory: ~/project
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/litellm_test"

    steps:
      - checkout
      - setup_google_dns
      - install_uv
      - run:
          name: Install Dependencies
          command: |
            uv sync --frozen --all-groups --all-extras --python 3.12
      - save_cache:
          paths:
            - ./.venv
          key: v2-dependencies-{{ checksum "uv.lock" }}
      - wait_for_service:
          url: tcp://localhost:5432
          timeout: "60"
      - run:
          name: Seed DB schema via prisma db push
          command: |
            set +e
            uv run --no-sync litellm --skip_server_startup --use_prisma_db_push
            set -e
      - run:
          name: Generate Prisma Client
          command: uv run --no-sync python -m prisma generate
      # Run pytest and generate JUnit XML report
      - run:
          name: Run tests
          command: |
            pwd
            ls
            uv run --no-sync python -m pytest -v tests/proxy_admin_ui_tests -x --junitxml=test-results/junit.xml --durations=5 -n 2
          no_output_timeout: 15m

      # Store test results
      - store_test_results:
          path: test-results

  litellm_router_testing: # Runs all tests with the "router" keyword

              "boto3==1.36.0" "aioboto3==13.4.0" langchain lunary==0.2.5 \
              "azure-identity==1.16.1" "langfuse==2.59.7" "logfire==0.29.0" numpydoc \
              traceloop-sdk==0.21.1 openai==1.100.1 prisma==0.11.0 \

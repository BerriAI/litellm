            - /home/circleci/.local
          key: v1-router-testing-deps-{{ checksum "uv.lock" }}
      # Run pytest and generate JUnit XML report
      - setup_litellm_enterprise_pip
      - run:
          name: Run tests
          command: |
            pwd

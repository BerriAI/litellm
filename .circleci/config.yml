    working_directory: ~/project
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/circle_test"
    steps:
      - checkout
      - setup_google_dns
      - run:
          name: Show git commit hash
          command: |
            echo "Git commit hash: $CIRCLE_SHA1"
      - setup_remote_docker:
          docker_layer_caching: true
      - restore_cache:
          keys:
            - v3-litellm-uv-deps-{{ checksum "requirements.txt" }}-{{ checksum ".circleci/config.yml" }}
      - run:
          name: Install Dependencies
          command: |
            python -m pip install --upgrade pip uv
            uv pip install --system -r requirements.txt
            pip install "pytest==7.3.1" "pytest-retry==1.6.3" "pytest-mock==3.12.0" \
              "pytest-asyncio==0.21.1" "pytest-cov==5.0.0"
      - save_cache:
          paths:
            - ~/.local/lib
            - ~/.local/bin
            - ~/.cache/uv
          key: v3-litellm-uv-deps-{{ checksum "requirements.txt" }}-{{ checksum ".circleci/config.yml" }}
      - run:
          name: Install dockerize
          command: |
            wget https://github.com/jwilder/dockerize/releases/download/v0.6.1/dockerize-linux-amd64-v0.6.1.tar.gz
            sudo tar -C /usr/local/bin -xzvf dockerize-linux-amd64-v0.6.1.tar.gz
            rm dockerize-linux-amd64-v0.6.1.tar.gz
      - run:
          name: Wait for PostgreSQL to be ready
          command: dockerize -wait tcp://localhost:5432 -timeout 1m
      - run:
          name: Run Security Scans
          command: |
            chmod +x ci_cd/security_scans.sh
            ./ci_cd/security_scans.sh
      - run:
          name: Run prisma ./docker/entrypoint.sh
          command: |
            set +e
            chmod +x docker/entrypoint.sh
            ./docker/entrypoint.sh
            set -e
      # Run pytest and generate JUnit XML report
      - run:
          name: Run tests
          command: |
            python -m pytest tests/proxy_security_tests -v -x --junitxml=test-results/junit.xml --durations=5
          no_output_timeout: 15m
      # Store test results
      - store_test_results:
          path: test-results

name: Build and Push to GCR

on:
  push:
    branches:
      - release/prod
      - release/sandbox
      - sync/v*
  workflow_dispatch:  # allows manual trigger for testing

env:
  IMAGE_NAME: litellm

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: "Build & Push to GCR"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get short commit SHA
        id: commit
        run: echo "sha=$(git rev-parse --short=6 HEAD)" >> $GITHUB_OUTPUT

      - name: Select environment
        id: envselect
        run: |
          if [[ "${{ github.ref_name }}" == "release/prod" ]]; then
            echo "project=xyne-prod" >> $GITHUB_OUTPUT
          else
            echo "project=xyne-dev-461113" >> $GITHUB_OUTPUT
          fi

      - name: Set image tag
        id: image
        run: |
          IMAGE_TAG="gcr.io/${{ steps.envselect.outputs.project }}/${{ env.IMAGE_NAME }}:${{ steps.commit.outputs.sha }}-juspay-build-v${{ github.run_number }}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${IMAGE_TAG}"

      - name: Authenticate to Google Cloud (prod)
        if: github.ref_name == 'release/prod'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_KEY }}

      - name: Authenticate to Google Cloud (sandbox)
        if: github.ref_name != 'release/prod'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_KEY_SANDBOX }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.non_root
          push: true
          platforms: linux/amd64
          tags: ${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit SHA | \`${{ steps.commit.outputs.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Number | \`${{ github.run_number }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.image.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pull Command" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ steps.image.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

name: Updates model_prices_and_context_window.json and Create Pull Request

on:
  schedule:
    - cron: "0 0 * * 0"  # Run every Sunday at midnight
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  auto_update_price_and_context_window:
    if: github.repository == 'BerriAI/litellm'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install aiohttp

      - name: Update JSON Data
        run: python ".github/workflows/auto_update_price_and_context_window_file.py"

      - name: Create Pull Request
        run: |
          BRANCH="auto-update-model-prices-$(date +'%Y-%m-%d')"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add model_prices_and_context_window.json
          # Only commit and open a PR if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to model_prices_and_context_window.json — skipping PR."
            exit 0
          fi
          git commit -m "chore: update model_prices_and_context_window.json ($(date +'%Y-%m-%d'))"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update model_prices_and_context_window.json ($(date +'%Y-%m-%d'))" \
            --body "$(cat <<'EOF'
          Automated weekly sync of model pricing and context window data.

          **Providers updated:**
          - OpenRouter (`https://openrouter.ai/api/v1/models`)
          - Vercel AI Gateway (`https://ai-gateway.vercel.sh/v1/models`)
          - NVIDIA NIM (`https://integrate.api.nvidia.com/v1/models`) — public endpoint, no auth required

          New models are added and existing pricing/context fields are refreshed.
          Manually curated fields (e.g. `supports_assistant_prefill`, `tool_use_system_prompt_tokens`) are preserved.
          EOF
          )" \
            --head "$BRANCH" \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

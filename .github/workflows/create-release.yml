name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. 1.84.0, 1.84.0rc1, 1.84.0.dev42, 1.84.0-dev.2, 1.84.0.post1; legacy v1.83.10-stable still accepted)"
        required: true
        type: string
      commit_hash:
        description: "Full 40-char commit SHA to target"
        required: true
        type: string

permissions: {}

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate inputs
        env:
          TAG: ${{ inputs.tag }}
          COMMIT_HASH: ${{ inputs.commit_hash }}
        run: |
          if ! echo "${COMMIT_HASH}" | grep -qE '^[0-9a-f]{40}$'; then
            echo "::error::commit_hash must be a full 40-character commit SHA"
            exit 1
          fi
          if ! echo "${TAG}" | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::tag must start with X.Y.Z (optional leading v), e.g. 1.84.0, 1.84.0rc1, 1.84.0.dev42, or v1.83.10-stable"
            exit 1
          fi

      # The default GITHUB_TOKEN cannot create a tag/release whose target
      # commit's `.github/workflows/` tree has drifted from the default branch
      # (older stable lines drift most) — GitHub then demands `workflows: write`,
      # which is not grantable to GITHUB_TOKEN via `permissions:`. Mint the
      # LITELLM_RELEASE_APP installation token (Contents + Workflows: write)
      # instead. This is the same app project-releaser uses to dispatch this
      # workflow, scoped to BerriAI/litellm.
      - name: Mint release app token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.LITELLM_RELEASE_APP_ID }}
          private-key: ${{ secrets.LITELLM_RELEASE_APP_PRIVATE_KEY }}
          owner: BerriAI
          repositories: litellm

      - name: Create release
        env:
          TAG: ${{ inputs.tag }}
          COMMIT_HASH: ${{ inputs.commit_hash }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const tag = process.env.TAG;
            const commitHash = process.env.COMMIT_HASH;

            // Mark RC / dev / nightly / alpha / beta tags as GitHub pre-releases.
            // Accept both PEP 440 (`.dev`) and SemVer (`-dev`) separators so tags
            // like `1.84.0.dev2` and `1.84.0-dev.2` are both detected.
            // PEP 440 post-releases (e.g. `1.84.0.post1`) and legacy `-stable[.patch.N]`
            // are stable maintenance releases, not pre-releases.
            const isPrerelease = /(?:rc|nightly|alpha|beta|[-.]dev)/i.test(tag);

            // A stable release should only claim the repo "latest" badge when its
            // version is >= the current latest. Otherwise a backport (e.g. 1.84.6)
            // would steal "latest" from a newer line (e.g. 1.88.1).
            const versionKey = (rawTag) => {
              const m = String(rawTag).match(/^v?(\d+)\.(\d+)\.(\d+)/);
              if (!m) return null;
              const maintenance = String(rawTag).match(/(?:\.post|\.patch\.)(\d+)/i);
              return [Number(m[1]), Number(m[2]), Number(m[3]), maintenance ? Number(maintenance[1]) : 0];
            };
            const isAtLeast = (a, b) => {
              for (let i = 0; i < a.length; i++) {
                if (a[i] !== b[i]) return a[i] > b[i];
              }
              return true;
            };

            const cosignSection = [
              `## Verify Docker Image Signature`,
              ``,
              `All LiteLLM Docker images are signed with [cosign](https://docs.sigstore.dev/cosign/overview/). Every release is signed with the same key introduced in [commit \`0112e53\`](https://github.com/BerriAI/litellm/commit/0112e53046018d726492c814b3644b7d376029d0).`,
              ``,
              `**Verify using the pinned commit hash (recommended):**`,
              ``,
              `A commit hash is cryptographically immutable, so this is the strongest way to ensure you are using the original signing key:`,
              ``,
              '```bash',
              `cosign verify \\`,
              `  --key https://raw.githubusercontent.com/BerriAI/litellm/0112e53046018d726492c814b3644b7d376029d0/cosign.pub \\`,
              `  ghcr.io/berriai/litellm:${tag}`,
              '```',
              ``,
              `**Verify using the release tag (convenience):**`,
              ``,
              `Tags are protected in this repository and resolve to the same key. This option is easier to read but relies on tag protection rules:`,
              ``,
              '```bash',
              `cosign verify \\`,
              `  --key https://raw.githubusercontent.com/BerriAI/litellm/${tag}/cosign.pub \\`,
              `  ghcr.io/berriai/litellm:${tag}`,
              '```',
              ``,
              `Expected output:`,
              ``,
              '```',
              `The following checks were performed on each of these signatures:`,
              `  - The cosign claims were validated`,
              `  - The signatures were verified against the specified public key`,
              '```',
              ``,
              `---`,
              ``,
            ].join('\n');

            try {
              let makeLatest = "false";
              const newVersion = versionKey(tag);
              if (!isPrerelease && newVersion) {
                let latestVersion = null;
                try {
                  const latest = await github.rest.repos.getLatestRelease({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                  });
                  latestVersion = versionKey(latest.data.tag_name);
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
                makeLatest = (!latestVersion || isAtLeast(newVersion, latestVersion)) ? "true" : "false";
              }

              const response = await github.rest.repos.createRelease({
                draft: true,
                generate_release_notes: true,
                target_commitish: commitHash,
                name: tag,
                owner: context.repo.owner,
                prerelease: isPrerelease,
                repo: context.repo.repo,
                tag_name: tag,
              });

              const updatedBody = cosignSection + (response.data.body ?? '');
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: response.data.id,
                body: updatedBody,
                draft: false,
                make_latest: makeLatest,
              });

            } catch (error) {
              // Surface enough context that a future failure isn't an opaque
              // "Resource not accessible by integration" with no clue which
              // call or permission was at fault.
              core.error(`Release creation failed: ${error.status ?? '?'} ${error.message}`);
              if (error.request) {
                core.error(`Failed call: ${error.request.method} ${error.request.url}`);
              }
              const accepted = error.response?.headers?.['x-accepted-github-permissions'];
              if (accepted) {
                core.error(`Endpoint requires permissions: ${accepted}`);
              }
              core.setFailed(error.message);
            }

  create-branch:
    name: Create Release Branch
    needs: release
    permissions:
      contents: write
    # Pass the release-app secrets through so the reusable workflow can mint the
    # same installation token — branch creation hits the identical
    # `workflows: write` guard as the release tag on drifted stable lines.
    secrets: inherit
    uses: ./.github/workflows/create-release-branch.yml
    with:
      tag: ${{ inputs.tag }}
      commit_hash: ${{ inputs.commit_hash }}

name: Sync PR Autopilot

# Verify & auto-merge the daily "chore: sync upstream" PR once CI is green.
# CI-green is the safety gate. Conflicts / persistently-red CI are held and
# reported (Slack + GitHub + optional email), not forced through.
#
# Triggered when check suites finish (the real-time path) plus a weekday cron
# backstop. Merging fires the existing dispatch-infra-build.yml -> infra build.

on:
  check_suite:
    types: [completed]
  schedule:
    - cron: "20 8 * * 1-5" # weekday backstop sweep (UTC), after the morning sync PR + CI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Evaluate only — do not re-run CI or merge"
        type: boolean
        default: false

permissions:
  contents: write # merge the sync PR and delete its branch
  pull-requests: write # mark ready, comment, merge
  issues: write # create/apply the sync-held and autopilot-rerun-N labels (the re-run cap relies on these persisting)
  actions: write # re-run failed CI runs
  checks: read
  statuses: read

concurrency:
  group: sync-pr-autopilot-${{ github.repository }}
  cancel-in-progress: false

jobs:
  autopilot:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - name: Checkout (for the autopilot script)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run sync PR autopilot
        id: autopilot
        env:
          # PAT preferred: merging with GITHUB_TOKEN would suppress the
          # downstream pull_request:closed event that dispatch-infra-build needs.
          GH_TOKEN: ${{ secrets.SYNC_AUTOMERGE_TOKEN || secrets.GITHUB_TOKEN }}
          # Dormant until the PAT exists: a GITHUB_TOKEN merge would skip the infra build.
          HAS_AUTOMERGE_TOKEN: ${{ secrets.SYNC_AUTOMERGE_TOKEN != '' }}
          BASE_BRANCH: litellm_internal_staging
          HEAD_PREFIX: chore/sync-upstream-
          MERGE_METHOD: merge
          MAX_RERUNS: "2"
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: bash .github/scripts/sync-pr-autopilot.sh

      - name: Email summary (optional, via Resend)
        if: >-
          ${{ always() && env.RESEND_API_KEY != ''
          && contains(fromJSON('["merged","held"]'), steps.autopilot.outputs.outcome) }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: ${{ vars.SYNC_AUTOPILOT_EMAIL_TO || 'shudong@rayward.ai' }}
          EMAIL_FROM: ${{ vars.SYNC_AUTOPILOT_EMAIL_FROM || 'sync-autopilot@rayward.ai' }}
          OUTCOME: ${{ steps.autopilot.outputs.outcome }}
          PR_NUMBER: ${{ steps.autopilot.outputs.pr_number }}
          PR_URL: ${{ steps.autopilot.outputs.pr_url }}
          PR_TITLE: ${{ steps.autopilot.outputs.pr_title }}
          REPO: ${{ github.repository }}
        run: |
          subject="[sync-autopilot] ${REPO} #${PR_NUMBER} — ${OUTCOME}"
          body="Sync PR Autopilot — ${REPO}\nOutcome: ${OUTCOME}\nPR #${PR_NUMBER}: ${PR_TITLE}\n${PR_URL}"
          jq -n --arg from "$EMAIL_FROM" --arg to "$EMAIL_TO" \
                --arg subject "$subject" --arg text "$body" \
                '{from:$from, to:[$to], subject:$subject, text:$text}' \
          | curl -sf -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer ${RESEND_API_KEY}" \
              -H "Content-Type: application/json" \
              --data @- >/dev/null || echo "::warning::Resend email failed"

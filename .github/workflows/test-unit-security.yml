name: "Unit Tests: Security"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  security:
    uses: ./.github/workflows/_test-unit-base.yml
    with:
      test-path: "tests/proxy_security_tests"
      workers: 1
      reruns: 1

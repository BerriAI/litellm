name: Alert Bridge

on:
  workflow_dispatch:
    inputs:
      mode:
        required: true
        type: choice
        options:
          - list
          - get
          - dismiss
          - list_secrets
      dismissals:
        required: false
        default: '[]'
        description: 'JSON array of {number,reason,comment}'
      alert_number:
        required: false
        default: ''
        description: 'Alert number to fetch full detail for (mode=get)'

permissions:
  security-events: write
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: List alerts
        if: inputs.mode == 'list'
        run: |
          gh api --paginate "repos/${{ github.repository }}/code-scanning/alerts?state=open&per_page=100" > alerts.json
          total=$(jq length alerts.json)
          echo "Open alerts: $total" | tee -a $GITHUB_STEP_SUMMARY
          jq -r 'group_by(.rule.id) | .[] | "\(.[0].rule.id) [\(.[0].rule.severity)]: \(length) alerts — numbers: \([.[].number] | join(","))"' alerts.json | tee -a $GITHUB_STEP_SUMMARY

      - name: Upload alerts artifact
        if: inputs.mode == 'list'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: alerts
          path: alerts.json
          overwrite: true

      - name: Get alert
        if: inputs.mode == 'get'
        env:
          ALERT_NUMBER: ${{ inputs.alert_number }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/code-scanning/alerts/$ALERT_NUMBER" > alert.json
          jq -r '"rule: \(.rule.id) [\(.rule.severity // .rule.security_severity_level)]\nstate: \(.state)\nmost_recent_instance.ref: \(.most_recent_instance.ref)\nmost_recent_instance.commit_sha: \(.most_recent_instance.commit_sha)\nlocation: \(.most_recent_instance.location.path):\(.most_recent_instance.location.start_line)\nmessage: \(.most_recent_instance.message.text)\nhtml_url: \(.html_url)"' alert.json | tee -a $GITHUB_STEP_SUMMARY
          echo '```json' >> $GITHUB_STEP_SUMMARY
          cat alert.json | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: List secret scanning alerts
        if: inputs.mode == 'list_secrets'
        run: |
          if gh api --paginate "repos/${{ github.repository }}/secret-scanning/alerts?state=open&per_page=100" > secrets.json; then
            total=$(jq length secrets.json)
            echo "Open secret-scanning alerts: $total" | tee -a $GITHUB_STEP_SUMMARY
            jq -r '.[] | "#\(.number) [\(.secret_type)]: \(.locations_url // "no-location-url")"' secrets.json | tee -a $GITHUB_STEP_SUMMARY
          else
            echo "secret-scanning API call failed (likely missing token scope)" | tee -a $GITHUB_STEP_SUMMARY
          fi

      - name: Dismiss alerts
        if: inputs.mode == 'dismiss'
        env:
          DISMISSALS: ${{ inputs.dismissals }}
          REPO: ${{ github.repository }}
        run: |
          echo "$DISMISSALS" | jq -c '.[]' | while read d; do
            n=$(jq -r .number <<<"$d")
            r=$(jq -r .reason <<<"$d")
            c=$(jq -r .comment <<<"$d")
            gh api -X PATCH "repos/$REPO/code-scanning/alerts/$n" \
              -f state=dismissed \
              -f dismissed_reason="$r" \
              -f dismissed_comment="$c" \
              && echo "dismissed #$n ($r)" | tee -a $GITHUB_STEP_SUMMARY
          done

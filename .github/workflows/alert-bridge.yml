name: Alert Bridge

on:
  workflow_dispatch:
    inputs:
      mode:
        required: true
        type: choice
        options:
          - list
          - dismiss
      dismissals:
        required: false
        default: '[]'
        description: 'JSON array of {number,reason,comment}'

permissions:
  security-events: write
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: List alerts
        if: inputs.mode == 'list'
        run: |
          gh api --paginate "repos/${{ github.repository }}/code-scanning/alerts?state=open&per_page=100" > alerts.json
          total=$(jq length alerts.json)
          echo "Open alerts: $total" | tee -a $GITHUB_STEP_SUMMARY
          jq -r 'group_by(.rule.id) | .[] | "\(.[0].rule.id) [\(.[0].rule.severity)]: \(length) alerts — numbers: \([.[].number] | join(","))"' alerts.json | tee -a $GITHUB_STEP_SUMMARY

      - name: Upload alerts artifact
        if: inputs.mode == 'list'
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: alerts
          path: alerts.json
          overwrite: true

      - name: Dismiss alerts
        if: inputs.mode == 'dismiss'
        run: |
          echo '${{ inputs.dismissals }}' | jq -c '.[]' | while read d; do
            n=$(jq -r .number <<<"$d")
            r=$(jq -r .reason <<<"$d")
            c=$(jq -r .comment <<<"$d")
            gh api -X PATCH "repos/${{ github.repository }}/code-scanning/alerts/$n" \
              -f state=dismissed \
              -f dismissed_reason="$r" \
              -f dismissed_comment="$c" \
              && echo "dismissed #$n ($r)" | tee -a $GITHUB_STEP_SUMMARY
          done

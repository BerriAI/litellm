name: Publish litellm-enterprise to PyPI

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (ignored when 'version' is set)"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Exact version to publish (e.g. 0.1.34.dev1). Overrides bump."
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.repository == 'BerriAI/litellm'
    permissions:
      contents: write
      pull-requests: write
    defaults:
      run:
        working-directory: enterprise

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Bump version
        id: bump
        run: |
          OLD=$(poetry version -s)
          if [ -n "${{ github.event.inputs.version }}" ]; then
            poetry version "${{ github.event.inputs.version }}"
          else
            poetry version ${{ github.event.inputs.bump }}
          fi
          NEW=$(poetry version -s)
          echo "old=$OLD" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Build
        run: poetry build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_ENTERPRISE }}
        run: |
          pip install twine
          twine upload dist/litellm_enterprise-${{ steps.bump.outputs.new }}*

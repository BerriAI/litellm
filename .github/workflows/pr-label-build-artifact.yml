# Builds and pushes the LiteLLM database image to ECR when a maintainer applies
# the `build-ecr-artifact` label.
#
# TOCTOU mitigation: GitHub stores commit_id on each review. The workflow requires
# at least one APPROVED review whose commit_id matches the current PR head, from a
# reviewer who is not the PR author and has write+ access. If the branch is
# force-pushed, re-approve the new tip before labeling.
name: PR Build Artifact

on:
  pull_request:
    types:
      - labeled

# Default deny: token permissions are set on the job (zizmor: avoid workflow-scoped
# id-token; auditor finding excessive-permissions).

concurrency:
  group: pr-build-artifact-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-push-image:
    name: Build and push LiteLLM PR artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -euo pipefail {0}

    # Least privilege for this job only (HIGH fix: job-scoped id-token, not workflow).
    # - contents: read — checkout + collaborator permission API for the actor check
    # - pull-requests: read — list PR reviews (commit_id for approval gate)
    # - id-token: write — mint OIDC JWT for AWS role assumption (no long-lived keys)
    permissions:
      contents: read
      pull-requests: read
      id-token: write

    if: >
      github.event.action == 'labeled' &&
      github.event.label.name == 'build-ecr-artifact' &&
      github.event.pull_request.head.repo.full_name == github.repository
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ vars.AWS_ROLE_TO_ASSUME }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

    steps:
      - name: Verify PR head has maintainer approval on this commit
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          lc_head="$(printf '%s' "${HEAD_SHA}" | tr '[:upper:]' '[:lower:]')"
          mapfile -t reviewers < <(gh api "/repos/${REPOSITORY}/pulls/${PR_NUMBER}/reviews" --paginate \
            --jq --arg sha "${lc_head}" --arg author "${PR_AUTHOR}" -r '
              [ .[]
                | select(.state == "APPROVED")
                | select((.commit_id // "") | ascii_downcase == $sha)
                | select(.user.login != null)
                | select(.user.login != $author)
                | .user.login
              ] | unique | .[]')

          if [[ "${#reviewers[@]}" -eq 0 ]] || [[ -z "${reviewers[0]:-}" ]]; then
            echo "::error::Need an APPROVED review on the current head (${HEAD_SHA}) from someone other than the PR author. If the branch changed, approve again, then apply the label."
            exit 1
          fi

          found=0
          for login in "${reviewers[@]}"; do
            [[ -z "${login}" ]] && continue
            perm="$(gh api "/repos/${REPOSITORY}/collaborators/${login}/permission" --jq '.permission')"
            case "${perm}" in
              admin|maintain|write)
                echo "Qualifying approval: ${login} (${perm}) on ${HEAD_SHA}"
                found=1
                break
                ;;
            esac
          done

          if [[ "${found}" -ne 1 ]]; then
            echo "::error::Approvals on this commit were found, but no approver has write, maintain, or admin."
            exit 1
          fi

      - name: Verify label actor has write access
        env:
          GH_TOKEN: ${{ github.token }}
          LABEL_ACTOR: ${{ github.event.sender.login }}
          REPOSITORY: ${{ github.repository }}
        run: |
          permission="$(gh api "/repos/${REPOSITORY}/collaborators/${LABEL_ACTOR}/permission" --jq '.permission')"
          echo "Label actor ${LABEL_ACTOR} has repository permission: ${permission}"

          case "${permission}" in
            admin|maintain|write)
              ;;
            *)
              echo "User ${LABEL_ACTOR} must have write, maintain, or admin access to trigger this workflow."
              exit 1
              ;;
          esac

      - name: Validate required configuration
        run: |
          test -n "${AWS_REGION}" || { echo "Missing repository variable: AWS_REGION"; exit 1; }
          test -n "${AWS_ROLE_TO_ASSUME}" || { echo "Missing repository variable: AWS_ROLE_TO_ASSUME"; exit 1; }
          test -n "${ECR_REPOSITORY}" || { echo "Missing repository variable: ECR_REPOSITORY"; exit 1; }

      - name: Checkout PR head
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: litellm-pr-ecr-${{ github.event.pull_request.number }}
          role-duration-seconds: 1200

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2

      - name: Set image tags
        id: image-tags
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          short_sha="$(printf '%s' "${PR_HEAD_SHA}" | tr '[:upper:]' '[:lower:]' | cut -c1-7)"
          trace_tag="litellm-pr-${PR_NUMBER}-${short_sha}"

          {
            echo "trace_uri=${ECR_REGISTRY}/${ECR_REPOSITORY}:${trace_tag}"
            echo "trace_tag=${trace_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12

      - name: Build and push LiteLLM database image
        uses: docker/build-push-action@0adf9959216b96bec444f325f1e493d4aa344497 # v6.14
        with:
          context: .
          file: ./docker/Dockerfile.database
          push: true
          provenance: false
          tags: ${{ steps.image-tags.outputs.trace_uri }}
          # Isolate GHA cache per PR so PR-controlled Dockerfiles cannot poison sibling workflows.
          cache-from: type=gha,scope=pr-${{ github.event.pull_request.number }}
          cache-to: type=gha,mode=max,scope=pr-${{ github.event.pull_request.number }}

      - name: Write workflow summary
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          TRACE_URI: ${{ steps.image-tags.outputs.trace_uri }}
        run: |
          {
            echo "### PR build artifact pushed"
            echo
            echo "- PR: \`#${PR_NUMBER}\`"
            echo "- Head ref: \`${PR_HEAD_REF}\`"
            echo "- Head SHA: \`${PR_HEAD_SHA}\`"
            echo "- **Immutable** image URI (pin by digest in production): \`${TRACE_URI}\`"
            echo
            echo "Requires label \`build-ecr-artifact\` and an **Approve** on the current head from a non-author reviewer with write+ access."
          } >> "${GITHUB_STEP_SUMMARY}"

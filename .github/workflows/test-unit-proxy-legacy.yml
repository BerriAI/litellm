name: "Unit Tests: Proxy Legacy Tests"

on:
  pull_request:
    branches:
      - main
      - litellm_internal_staging
      - litellm_oss_branch
      - "litellm_**"

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - test-group: auth-and-jwt
            test-path: "tests/proxy_unit_tests/test_[a-j]*.py"
          - test-group: key-generation
            test-path: "tests/proxy_unit_tests/test_[k-o]*.py"
          - test-group: proxy-config
            test-path: >-
              tests/proxy_unit_tests/test_prisma*.py
              tests/proxy_unit_tests/test_prompt*.py
              tests/proxy_unit_tests/test_proxy_[c-r]*.py
          - test-group: proxy-server
            test-path: "tests/proxy_unit_tests/test_proxy_server.py"
          - test-group: proxy-server-extras
            test-path: >-
              tests/proxy_unit_tests/test_proxy_server_*.py
              tests/proxy_unit_tests/test_proxy_setting_guardrails.py
          - test-group: proxy-utils
            test-path: "tests/proxy_unit_tests/test_proxy_utils.py"
          - test-group: proxy-token-counter
            test-path: "tests/proxy_unit_tests/test_proxy_token_counter.py"
          - test-group: proxy-response-and-misc
            test-path: "tests/proxy_unit_tests/test_[r-t]*.py"
          - test-group: proxy-user-auth-and-spend
            test-path: "tests/proxy_unit_tests/test_[u-z]*.py"
    name: ${{ matrix.test-group }}
    uses: ./.github/workflows/_test-unit-base.yml
    with:
      test-path: ${{ matrix.test-path }}
      workers: 2
      reruns: 1
      artifact-name: proxy-legacy-${{ matrix.test-group }}

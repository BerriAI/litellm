name: "Unit Tests: LLM Provider Transformations"

on:
  pull_request:
    branches:
      - main
      - litellm_internal_staging
      - litellm_oss_staging
      - "litellm_**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  vertex-ai:
    name: Vertex AI
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/_test-unit-base.yml
    with:
      test-path: "tests/test_litellm/llms/vertex_ai"
      workers: 1
      reruns: 2
      artifact-name: llm-vertex-ai

  translation-characterization:
    name: Translation Characterization (v1 snapshot corpus)
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/_test-unit-base.yml
    with:
      test-path: "tests/translation_characterization"
      workers: 1
      reruns: 0
      artifact-name: translation-characterization

  other-providers:
    name: All Other Providers
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    uses: ./.github/workflows/_test-unit-base.yml
    with:
      test-path: "tests/test_litellm/llms --ignore=tests/test_litellm/llms/vertex_ai"
      workers: 2
      reruns: 2
      artifact-name: llm-other-providers

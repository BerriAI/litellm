name: Create Daily Staging Branch

on:
  schedule:
    - cron: "0 0,12 * * *" # Runs every 12 hours at midnight and noon UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  create-staging-branch:
    if: github.repository == 'BerriAI/litellm'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create daily staging branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="litellm_oss_staging_$(date +'%m_%d_%Y')"
          echo "Creating branch: $BRANCH_NAME"

          git fetch --all

          if git show-ref --verify --quiet refs/remotes/origin/$BRANCH_NAME; then
            echo "Branch $BRANCH_NAME already exists. Skipping creation."
          else
            echo "Creating new branch: $BRANCH_NAME"
            git checkout -b $BRANCH_NAME origin/main
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/$BRANCH_NAME"
            echo "Successfully created and pushed branch: $BRANCH_NAME"
          fi

  create-internal-dev-branch:
    if: github.repository == 'BerriAI/litellm'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create internal dev branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH_NAME="litellm_internal_dev_$(date +'%m_%d_%Y')"
          echo "Creating branch: $BRANCH_NAME"

          git fetch --all

          if git show-ref --verify --quiet refs/remotes/origin/$BRANCH_NAME; then
            echo "Branch $BRANCH_NAME already exists. Skipping creation."
          else
            echo "Creating new branch: $BRANCH_NAME"
            git checkout -b $BRANCH_NAME origin/main
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:refs/heads/$BRANCH_NAME"
            echo "Successfully created and pushed branch: $BRANCH_NAME"
          fi

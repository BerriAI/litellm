name: Create Daily Staging Branch

on:
  schedule:
    - cron: "0 0,12 * * *" # Runs every 12 hours at midnight and noon UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  create-staging-branch:
    # Upstream's release-branch factory: do NOT run it on this fork. We deploy by
    # pinned SHA and never cut litellm OSS releases, so these dated snapshots have
    # no consumer here and just pile up (3/day). Keep upstream's own fork guard.
    if: github.repository == 'BerriAI/litellm'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create daily staging branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure Git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Generate branch name with MM_DD_YYYY format
          BRANCH_NAME="litellm_oss_staging_$(date +'%m_%d_%Y')"
          echo "Creating branch: $BRANCH_NAME"

          # Fetch all branches
          git fetch --all

          # Check if the branch already exists
          if git show-ref --verify --quiet refs/remotes/origin/$BRANCH_NAME; then
            echo "Branch $BRANCH_NAME already exists. Skipping creation."
          else
            echo "Creating new branch: $BRANCH_NAME"
            # Create the new branch from the fork's default branch.
            # This fork's default is litellm_internal_staging (it has no `main`,
            # unlike upstream BerriAI/litellm), so base the daily branch on that.
            git checkout -b $BRANCH_NAME origin/litellm_internal_staging
            # persist-credentials is false, so push with an explicit tokenized remote
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$BRANCH_NAME"
            echo "Successfully created and pushed branch: $BRANCH_NAME"
          fi

  create-internal-dev-branch:
    # See above: upstream-only. Not run on this fork.
    if: github.repository == 'BerriAI/litellm'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create internal dev branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure Git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Generate branch name with MM_DD_YYYY format
          BRANCH_NAME="litellm_internal_dev_$(date +'%m_%d_%Y')"
          echo "Creating branch: $BRANCH_NAME"

          # Fetch all branches
          git fetch --all

          # Check if the branch already exists
          if git show-ref --verify --quiet refs/remotes/origin/$BRANCH_NAME; then
            echo "Branch $BRANCH_NAME already exists. Skipping creation."
          else
            echo "Creating new branch: $BRANCH_NAME"
            # Create the new branch from the fork's default branch.
            # This fork's default is litellm_internal_staging (it has no `main`,
            # unlike upstream BerriAI/litellm), so base the daily branch on that.
            git checkout -b $BRANCH_NAME origin/litellm_internal_staging
            # persist-credentials is false, so push with an explicit tokenized remote
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "$BRANCH_NAME"
            echo "Successfully created and pushed branch: $BRANCH_NAME"
          fi

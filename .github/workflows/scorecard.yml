name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '27 12 * * 4'
  push:
    # "main" is upstream's default branch; "litellm_internal_staging" is this
    # fork's default branch — without it the Scorecard scan never re-runs on a
    # push, leaving code-scanning alerts stale against an old commit.
    branches: ["main", "litellm_internal_staging"]
  # Allow on-demand re-scan (e.g. to refresh alerts after a fix lands).
  workflow_dispatch:

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    if: github.event.repository.default_branch == github.ref_name
    permissions:
      security-events: write
      id-token: write
      # Uncomment for private repos if needed:
      # contents: read
      # actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: results.sarif

name: LiteLLM Unit Tests (Matrix)

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        test-group:
          # tests/test_litellm split by subdirectory (~552 files total)
          - name: "llms"
            path: "tests/test_litellm/llms"
            workers: 4
          - name: "proxy"
            path: "tests/test_litellm/proxy"
            workers: 4
          - name: "integrations"
            path: "tests/test_litellm/integrations"
            workers: 4
          - name: "core-utils"
            path: "tests/test_litellm/litellm_core_utils"
            workers: 2
          - name: "other"
            path: "tests/test_litellm/caching tests/test_litellm/responses tests/test_litellm/secret_managers tests/test_litellm/vector_stores"
            workers: 2
          - name: "root"
            path: "tests/test_litellm/test_*.py"
            workers: 2
          # tests/proxy_unit_tests split alphabetically (~48 files total)
          - name: "proxy-unit-a"
            path: "tests/proxy_unit_tests/test_[a-o]*.py"
            workers: 2
          - name: "proxy-unit-b"
            path: "tests/proxy_unit_tests/test_[p-z]*.py"
            workers: 2

    name: test (${{ matrix.test-group.name }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            ~/.cache/pip
            .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry lock
          poetry install --with dev,proxy-dev --extras "proxy semantic-router"
          poetry run pip install pytest-retry==1.6.3 pytest-xdist google-genai==1.22.0 \
            google-cloud-aiplatform>=1.38 fastapi-offline==1.7.3 python-multipart==0.0.18 openapi-core

      - name: Setup litellm-enterprise
        run: |
          cd enterprise && poetry run pip install -e . && cd ..

      - name: Run tests - ${{ matrix.test-group.name }}
        run: |
          poetry run pytest ${{ matrix.test-group.path }} \
            --tb=short -vv \
            --maxfail=10 \
            -n ${{ matrix.test-group.workers }} \
            --durations=20

  # Aggregate job to require all matrix jobs pass
  test-complete:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Some test groups failed"
            exit 1
          fi
          echo "All test groups passed!"

      - name: Summary
        run: |
          echo "### ✅ All test groups completed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Group | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| llms | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| proxy | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| integrations | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| core-utils | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| other | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| root | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| proxy-unit-a | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| proxy-unit-b | ✅ |" >> $GITHUB_STEP_SUMMARY

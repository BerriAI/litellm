name: Check UI API Types Sync

on:
  pull_request:
    paths:
      - "litellm/proxy/**"
      - "litellm/types/**"
      - "enterprise/**"
      - "uv.lock"
      - "ui/litellm-dashboard/src/lib/http/schema.d.ts"
      - "ui/litellm-dashboard/scripts/gen-api-types.mjs"
      - "ui/litellm-dashboard/package.json"
      - "ui/litellm-dashboard/package-lock.json"
      - ".github/workflows/check-ui-api-types.yml"

permissions:
  contents: read

jobs:
  check-sync:
    name: Verify schema.d.ts matches the proxy OpenAPI spec
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.10.9"

      - name: Cache uv dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install backend dependencies
        run: .github/scripts/uv_sync_with_retries.sh --frozen --group ci --group proxy-dev --extra google --extra proxy --extra semantic-router

      - name: Generate Prisma client
        env:
          PRISMA_BINARY_CACHE_DIR: ${{ runner.temp }}/prisma-cache
        run: uv run --no-sync prisma generate --schema litellm/proxy/schema.prisma

      # Runs before gen:api because the snapshot is an *input* to schema.d.ts: for
      # lazy features the types are copied out of it verbatim. A stale snapshot
      # therefore regenerates matching-but-wrong types, so the check below would pass
      # while both files disagreed with the code. Report the root cause first.
      - name: Fail if the lazy OpenAPI snapshot is stale
        run: |
          set +e
          uv run --no-sync python -m litellm.proxy._lazy_openapi_snapshot --check
          status=$?
          set -e

          case "$status" in
            0)
              ;;
            2)
              echo "::error file=litellm/proxy/_lazy_openapi_snapshot.json::Could not verify the lazy OpenAPI snapshot: a lazy feature failed to import, so the regenerated snapshot would be incomplete. This is a missing dependency in this job, not snapshot drift. See the log for the feature and error."
              exit 1
              ;;
            *)
              echo "::error file=litellm/proxy/_lazy_openapi_snapshot.json::Lazy OpenAPI snapshot is out of sync with the proxy routes. Run 'python -m litellm.proxy._lazy_openapi_snapshot', commit the result, and re-run 'npm run gen:api' if schema.d.ts changes."
              exit 1
              ;;
          esac

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/litellm-dashboard/package-lock.json

      - name: Install dashboard dependencies
        working-directory: ui/litellm-dashboard
        run: npm ci

      - name: Regenerate types from the live spec
        working-directory: ui/litellm-dashboard
        env:
          LITELLM_PYTHON: "uv run --no-sync python"
        run: npm run gen:api

      - name: Fail if types are stale
        run: |
          if ! git diff --exit-code -- ui/litellm-dashboard/src/lib/http/schema.d.ts; then
            echo "::error file=ui/litellm-dashboard/src/lib/http/schema.d.ts::Generated API types are out of sync with the proxy OpenAPI spec."
            echo ""
            echo "A backend route or model changed without regenerating the dashboard types."
            echo "To fix, run from ui/litellm-dashboard:"
            echo "  npm run gen:api"
            echo "then commit the updated src/lib/http/schema.d.ts."
            exit 1
          fi
          echo "schema.d.ts is in sync with the proxy OpenAPI spec."

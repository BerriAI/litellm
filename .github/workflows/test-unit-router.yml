name: "Unit Tests: Router"

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  router:
    uses: ./.github/workflows/_test-unit-base.yml
    with:
      test-path: "tests/router_unit_tests"
      workers: 4
      reruns: 2

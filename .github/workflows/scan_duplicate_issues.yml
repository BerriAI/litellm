name: Scan Duplicate Issues (One-Time)

on:
  workflow_dispatch:
    inputs:
      threshold:
        description: "Similarity threshold (0-1)"
        required: false
        default: "0.85"
      close:
        description: "Actually close duplicates (false = dry run)"
        required: false
        type: boolean
        default: false

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout scripts
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: .github/scripts
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Scan for duplicate issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_THRESHOLD: ${{ inputs.threshold }}
          INPUT_CLOSE: ${{ inputs.close }}
        run: |
          CLOSE_FLAG=""
          if [ "$INPUT_CLOSE" = "true" ]; then
            CLOSE_FLAG="--close"
          fi
          python3 .github/scripts/close_duplicate_issues.py \
            --scan \
            --repo ${{ github.repository }} \
            --threshold "$INPUT_THRESHOLD" \
            $CLOSE_FLAG

name: "LiteLLM CodeQL config"

queries:
  - uses: security-and-quality

# Known OOM queries on large Python codebases:
# CodeQL builds a full data flow graph in memory. These two queries trace
# sensitive data through every log call / regex pattern, causing combinatorial
# path explosion on codebases with extensive logging like LiteLLM (>2 GiB
# result sets). This is a known CodeQL scaling limitation, not a code issue.
# Re-test periodically as CodeQL improves or the codebase refactors logging.
query-filters:
  - exclude:
      id: py/clear-text-logging-sensitive-data  # CWE-312
  - exclude:
      id: py/polynomial-redos                   # CWE-730

paths-ignore:
  - tests
  - docs
  - "**/*.md"
  # py/weak-sensitive-data-hashing (CWE-328): the OCI signing call at
  # litellm/llms/oci/common_utils.py:100 hashes the HTTP request body to
  # produce the x-content-sha256 header required by the OCI HTTP signing
  # spec — a content-integrity hash, not a password or secret hash.
  # SHA-256 is mandated by Oracle for this header; see
  # https://docs.oracle.com/en-us/iaas/Content/API/Concepts/signingrequests.htm
  #
  # CodeQL has no native per-query path-scope filter, and GitHub Code
  # Scanning ignores `# lgtm[...]` / `# codeql[...]` inline comments, so
  # the narrowest available suppression is path-ignoring this single file.
  # This trades CodeQL coverage on one ~560-line OCI signing-utility file
  # for restored project-wide coverage of py/weak-sensitive-data-hashing
  # (and every other security-and-quality query) on every other file —
  # including litellm/proxy/utils.py, where the rule legitimately applies.
  - litellm/llms/oci/common_utils.py

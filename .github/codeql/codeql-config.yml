name: "LiteLLM CodeQL config"

# security-extended runs the full set of security queries (a superset of the
# default `security` suite) but omits the code-quality/style half of
# `security-and-quality`. The quality half produced hundreds of note/warning
# findings (js/unused-local-variable, js/automatic-semicolon-insertion,
# js/superfluous-trailing-arguments, js/comparison-between-incompatible-types,
# js/useless-assignment-to-local, ...) in vendored upstream UI code. Those are
# style, not vulnerabilities, and rewriting upstream UI to satisfy them would
# break the keep-the-fork-vanilla rule. Security coverage is unchanged.
queries:
  - uses: security-extended

# Known OOM queries on large Python codebases:
# CodeQL builds a full data flow graph in memory. These two queries trace
# sensitive data through every log call / regex pattern, causing combinatorial
# path explosion on codebases with extensive logging like LiteLLM (>2 GiB
# result sets). This is a known CodeQL scaling limitation, not a code issue.
# Re-test periodically as CodeQL improves or the codebase refactors logging.
query-filters:
  - exclude:
      id: py/clear-text-logging-sensitive-data  # CWE-312
  - exclude:
      id: py/polynomial-redos                   # CWE-730
  # py/weak-sensitive-data-hashing: litellm's SHA256 calls derive stable lookup
  # keys / rate-limit-bucket ids from API keys and tokens (e.g.
  # mcp_server/server.py builds `key:{sha256(api_key)}` as a cache key); they are
  # never used to store a password for later verification, which is the threat
  # this rule targets. SHA256 is the correct, intended choice for keyed lookups.
  - exclude:
      id: py/weak-sensitive-data-hashing        # CWE-327/916
  - exclude:
      id: py/log-injection                      # CWE-117 — taint explosion through litellm's pervasive logging; same scaling class as the excluded py/clear-text-logging-sensitive-data
  # py/stack-trace-exposure: tracebacks only reach loggers; ProxyException.to_dict() never serializes a traceback field; CodeQL cannot distinguish log sinks from HTTP response sinks
  - exclude:
      id: py/stack-trace-exposure               # CWE-209
  # py/incomplete-url-substring-sanitization: security-critical URL validation uses urlparse() tuple comparison; flagged startswith/endswith are non-security normalization (JWT heuristic, trailing-slash strip)
  - exclude:
      id: py/incomplete-url-substring-sanitization  # CWE-184

paths-ignore:
  - tests
  - docs
  - "**/*.md"
  # Standalone demo pages, not shipped product. Source of the
  # js/clear-text-storage-of-sensitive-data and js/insecure-randomness highs.
  - "scripts/adaptive_router_demo"
  # Example/demo servers and benchmark scripts — not deployed product code.
  # py/reflective-xss and py/regex-injection FPs surfaced from these paths.
  - "cookbook"
  - "scripts/benchmark_*"
  # js/clear-text-storage-of-sensitive-data FP: the MCP OAuth access token is
  # held in per-tab window.sessionStorage with a short TTL because the SPA must
  # read it from JS to call MCP servers. sessionStorage is the standard place
  # for this; there is no server-only alternative that keeps the token usable.
  # CodeQL cannot express "accepted, scoped client-side token cache", and a
  # query-filter exclude cannot be scoped to one file, so the file is ignored.
  - "ui/litellm-dashboard/src/utils/mcpTokenStore.ts"

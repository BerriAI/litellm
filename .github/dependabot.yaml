version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # langchain fix for GHSA-gr75-jv2w-4656 requires >=1.3.9, which needs
      # langgraph>=1.2.4,<1.3.0 — conflicts with pinned langgraph==1.0.10.
      # Remove when langgraph family can be bumped as a coordinated upgrade.
      - dependency-name: "langchain"
        versions: [">=1.3.9"]

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "npm"
    directory: "/ui/litellm-dashboard"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

%YAML 1.1
---
name: zixun
version: 0.0.1
schema: v1

allowAnonymousTelemetry: false

model_defaults: &model_defaults
  provider: openai
  apiBase: "<SERVER_URL>/v1"
  apiKey: "<API_KEY>"

models:
  - name: Anthropic Claude 3.5 Haiku
    <<: *model_defaults
    model: claude-3.5-haiku
    capabilities:
      - tool_use
  - name: Anthropic Claude 3.5 Sonnet
    <<: *model_defaults
    model: claude-3.5-sonnet
    capabilities:
      - tool_use
      - image_input
  - name: Anthropic Claude 4 Sonnet
    <<: *model_defaults
    model: claude-4-sonnet
    capabilities:
      - tool_use
      - image_input
  - name: Anthropic Claude 4.5 Haiku
    <<: *model_defaults
    model: claude-haiku-4-5
    capabilities:
      - tool_use
  - name: Anthropic Claude 4.5 Sonnet
    <<: *model_defaults
    model: claude-sonnet-4-5
    capabilities:
      - tool_use
      - image_input
  - name: OpenAI GPT-4o
    <<: *model_defaults
    model: gpt-4o
    capabilities:
      - tool_use
      - image_input
  - name: OpenAI GPT-4o mini
    <<: *model_defaults
    model: gpt-4o-mini
    capabilities:
      - tool_use
      - image_input
    roles:
      - autocomplete
